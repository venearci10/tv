<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venearci Stream Studio - Creador HLS/M3U8</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

  <div class="container">
    <header>
      <h1>📺 Venearci Stream Studio</h1>
      <p>Crea, gestiona y emite tus propios canales de TV en formato .m3u8</p>
    </header>

    <div class="main-grid">
      <!-- Panel de Creación -->
      <div class="panel">
        <h2>⚙️ 1. Programación del Canal</h2>
        
        <label>Nombre del Canal</label>
        <input type="text" id="channelName" placeholder="Ej: Venearci Music TV" value="Venearci TV">

        <h3>Parrilla de Vídeos</h3>
        <input type="text" id="videoTitle" placeholder="Título del vídeo / programa">
        <input type="text" id="videoUrl" placeholder="URL del vídeo (.mp4 o .m3u8 directo)">
        <input type="number" id="videoDuration" placeholder="Duración en segundos (ej: 180)" value="180">
        
        <button onclick="addVideo()" class="btn-primary">+ Añadir a la Parrilla</button>

        <h3>Parrilla Actual</h3>
        <ul id="playlistView" class="playlist"></ul>
        <button onclick="generateM3U8()" class="btn-success">⚡ Generar Manifiesto .m3u8</button>
      </div>

      <!-- Panel de Vista Previa y Exportación -->
      <div class="panel">
        <h2>📡 2. Emitir & Probar Canal</h2>
        <video id="previewPlayer" controls autoplay muted poster="https://raw.githubusercontent.com/venearci10/halkin10/refs/heads/main/Halkin1.png"></video>

        <h3>Tu Enlace Directo .m3u8 en GitHub Pages</h3>
        <input type="text" id="finalM3u8Url" readonly value="https://tu-usuario.github.io/mi-tv-platform/canales/canal1.m3u8">

        <h3>Código Manifiesto (.m3u8)</h3>
        <textarea id="m3u8Output" rows="7" readonly placeholder="El código HLS generado aparecerá aquí..."></textarea>
        <button onclick="downloadM3u8()" class="btn-secondary">💾 Descargar canal1.m3u8</button>
      </div>
    </div>
  </div>
<script src="script.js"></script>
  <script src="js/playlist-builder.js"></script>
</body>
</html>
